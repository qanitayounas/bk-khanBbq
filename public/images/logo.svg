<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Flame icon -->
  <g transform="translate(10, 10)">
    <!-- Outer flame -->
    <path d="M25 90C10 90 0 75 0 60C0 40 15 25 20 15C22 12 24 8 25 0C26 8 28 12 30 15C35 25 50 40 50 60C50 75 40 90 25 90Z" fill="url(#flameGrad)" />
    <!-- Inner flame -->
    <path d="M25 90C17 90 12 80 12 72C12 60 20 52 23 45C24 43 24.5 40 25 36C25.5 40 26 43 27 45C30 52 38 60 38 72C38 80 33 90 25 90Z" fill="url(#innerFlameGrad)" />
    <!-- Flame highlight -->
    <path d="M25 90C20 90 17 83 17 78C17 70 22 65 24 60C24.5 58 25 56 25 53C25 56 25.5 58 26 60C28 65 33 70 33 78C33 83 30 90 25 90Z" fill="#FFF5E0" opacity="0.6" />
  </g>

  <!-- BK text - bold script style -->
  <text x="65" y="65" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="bold" font-style="italic" fill="url(#textGrad)" letter-spacing="-1">BK</text>

  <!-- Khan's text - elegant script -->
  <text x="135" y="68" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-style="italic" fill="url(#textGrad)" letter-spacing="1">Khan's</text>

  <!-- BBQ text - bold block style -->
  <text x="310" y="68" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="900" fill="url(#bbqGrad)" letter-spacing="3">BBQ</text>

  <!-- Decorative line -->
  <line x1="65" y1="80" x2="395" y2="80" stroke="url(#lineGrad)" stroke-width="1" opacity="0.5" />

  <!-- Tagline -->
  <text x="230" y="100" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#D4A574" letter-spacing="4" text-anchor="middle" opacity="0.8">AUTHENTIC FLAME-GRILLED EXCELLENCE</text>

  <defs>
    <linearGradient id="flameGrad" x1="25" y1="0" x2="25" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="40%" stop-color="#FF8C00" />
      <stop offset="100%" stop-color="#DC3545" />
    </linearGradient>
    <linearGradient id="innerFlameGrad" x1="25" y1="36" x2="25" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFE066" />
      <stop offset="50%" stop-color="#FFB347" />
      <stop offset="100%" stop-color="#FF6B35" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="400" y2="0">
      <stop offset="0%" stop-color="#D4A574" />
      <stop offset="50%" stop-color="#E8C49A" />
      <stop offset="100%" stop-color="#D4A574" />
    </linearGradient>
    <linearGradient id="bbqGrad" x1="0" y1="0" x2="0" y2="68">
      <stop offset="0%" stop-color="#E8C49A" />
      <stop offset="100%" stop-color="#C4956A" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="65" y1="0" x2="395" y2="0">
      <stop offset="0%" stop-color="transparent" />
      <stop offset="50%" stop-color="#D4A574" />
      <stop offset="100%" stop-color="transparent" />
    </linearGradient>
  </defs>
</svg>
